<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pipelinedoc — GitLab Pipeline Triage Agent</title>
  <meta name="description" content="AI-powered GitLab CI/CD pipeline triage agent. Detects failures, reads logs, traces commits, and generates root-cause diagnoses via Gemini." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="site-header">
    <div class="logo-block">
      <svg class="logo-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="16" height="16" rx="4" stroke="#00e676" stroke-width="1.5"/>
        <path d="M5 6.5l3.5 3L5 12.5M10 12.5h3" stroke="#00e676" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-name">pipelinedoc</span>
      <span class="logo-sep">/</span>
      <span class="logo-sub">triage agent</span>
    </div>
    <div class="header-right">
      <span class="header-pill">Gemini 2.0 Flash</span>
      <span class="header-pill">GitLab MCP</span>
    </div>
  </header>

  <!-- ── App Shell ────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Left sidebar: inputs -->
    <aside class="sidebar" aria-label="Triage configuration">

      <div class="sidebar-section">
        <p class="section-label">CONFIGURATION</p>

        <div class="field-group">
          <label for="project-id" class="field-label">GitLab Project</label>
          <input
            type="text"
            id="project-id"
            class="field-input"
            placeholder="group/repo or numeric ID"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="field-group">
          <label for="branch-name" class="field-label">Branch</label>
          <input
            type="text"
            id="branch-name"
            class="field-input"
            placeholder="main"
            value="main"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>

      <div class="sidebar-section">
        <button id="run-btn" class="run-btn" onclick="runTriage()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M2.5 1.5l8 4.5-8 4.5V1.5z" fill="currentColor"/>
          </svg>
          <span id="btn-text">Run Triage</span>
        </button>
        <button class="clear-btn" onclick="clearOutput()">Clear Output</button>
      </div>

      <div class="sidebar-section sidebar-info">
        <p class="info-item">
          <span class="info-dot info-dot--green"></span>
          GitLab data via MCP
        </p>
        <p class="info-item">
          <span class="info-dot info-dot--blue"></span>
          Analysis by Gemini
        </p>
      </div>

    </aside>

    <!-- Right: terminal output -->
    <main class="terminal-pane" aria-label="Triage output">

      <div class="terminal-topbar">
        <div class="terminal-dots" aria-hidden="true">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <span class="terminal-label">triage output</span>
        <span class="terminal-status" id="status-badge">IDLE</span>
      </div>

      <div class="terminal-body" id="terminal-output" role="log" aria-live="polite">
        <div class="t-welcome">
          <span class="t-acc">pipelinedoc</span> ready. Enter a GitLab project and run triage.
        </div>
        <div class="t-dim">
          All GitLab data is fetched via MCP · Analysis by Gemini 2.0 Flash
        </div>
      </div>

    </main>

  </div><!-- /.app-shell -->

  <script src="app.js"></script>
</body>
</html>
